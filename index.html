<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Hub - Kabintify Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .btn-grad { background: linear-gradient(to right, #6366f1, #a855f7); transition: 0.3s; }
        .btn-grad:hover { opacity: 0.9; transform: translateY(-2px); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">School PR</h1>
            <p class="text-gray-400">ระบบประชาสัมพันธ์และแจ้งเตือนตารางเรียนอัตโนมัติ</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <h2 class="text-xl font-semibold mb-6 flex items-center"><span class="mr-2">🔥</span> ข่าวสารล่าสุด</h2>
                <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass p-6 sticky top-6">
                    <h2 class="text-xl font-semibold mb-4">⚙️ จัดการระบบ (Admin)</h2>
                    <div class="space-y-4 text-sm">
                        <div>
                            <label class="block mb-1 text-gray-400">ชื่อวิชา</label>
                            <input id="sub" type="text" class="w-full bg-white/10 border border-white/20 p-3 rounded-xl focus:outline-none" placeholder="เช่น คณิตศาสตร์">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-400">เวลา (HH:mm)</label>
                            <input id="tim" type="time" class="w-full bg-white/10 border border-white/20 p-3 rounded-xl focus:outline-none">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-400">ห้องเรียน</label>
                            <input id="rom" type="text" class="w-full bg-white/10 border border-white/20 p-3 rounded-xl focus:outline-none" placeholder="302">
                        </div>
                        <button onclick="addSchedule()" class="w-full btn-grad py-3 rounded-xl font-bold mt-2">เพิ่มการแจ้งเตือน</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ดึงข่าวสาร
        async function fetchNews() {
            const res = await fetch('/api/news');
            const data = await res.json();
            const grid = document.getElementById('news-grid');
            grid.innerHTML = data.items.map(item => `
                <div class="glass overflow-hidden flex flex-col hover:border-purple-500/50 transition">
                    <img src="${item.image || 'https://via.placeholder.com/400x200'}" class="h-40 w-full object-cover">
                    <div class="p-4">
                        <h3 class="font-medium text-sm line-clamp-2 mb-3 text-gray-200">${item.title}</h3>
                        <a href="${item.url}" target="_blank" class="text-xs text-blue-400 font-semibold hover:underline">อ่านต่อบน Facebook →</a>
                    </div>
                </div>
            `).join('');
        }

        // เพิ่มตารางเรียน
        async function addSchedule() {
            const data = {
                subject: document.getElementById('sub').value,
                time: document.getElementById('tim').value,
                room: document.getElementById('rom').value
            };
            await fetch('/api/admin/schedule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert('เพิ่มตารางเรียนสำเร็จ! ระบบจะแจ้งเข้า Discord เมื่อถึงเวลา');
        }

        fetchNews();
    </script>
</body>
</html>
