<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puatify - ระบบประชาสัมพันธ์</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [news, setNews] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                fetch('https://rss.app/feeds/v1.1/86OgZH1IGruJ0DEX.json')
                    .then(res => res.json())
                    .then(data => {
                        setNews(data.items);
                        setLoading(false);
                    });
            }, []);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className="glass sticky top-0 z-50 border-b border-gray-200 p-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <h1 className="text-2xl font-bold text-blue-600">Puatify</h1>
                            <div className="space-x-4">
                                <a href="#" className="text-gray-600 hover:text-blue-600">หน้าแรก</a>
                                <a href="admin.html" className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">ผู้ดูแลระบบ</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <header className="bg-blue-600 text-white py-16 px-4 text-center">
                        <h2 className="text-4xl font-bold mb-4">ข้อมูลข่าวสารและประชาสัมพันธ์</h2>
                        <p className="opacity-90">ติดตามข่าวสารจากโรงเรียนได้รวดเร็วผ่าน Line และ Discord</p>
                    </header>

                    {/* News Content */}
                    <main className="max-w-5xl mx-auto py-10 px-4">
                        <h3 className="text-xl font-semibold mb-6 border-l-4 border-blue-600 pl-3">ข่าวล่าสุดจาก Facebook</h3>
                        
                        {loading ? (
                            <div className="text-center py-20 text-gray-500">กำลังโหลดข้อมูล...</div>
                        ) : (
                            <div className="grid md:grid-cols-2 gap-6">
                                {news.map((item, index) => (
                                    <div key={index} className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow">
                                        {item.image && <img src={item.image} className="w-full h-48 object-cover" alt="news" />}
                                        <div className="p-5">
                                            <p className="text-xs text-blue-500 mb-2">{new Date(item.date_published).toLocaleDateString('th-TH')}</p>
                                            <h4 className="font-bold text-gray-800 mb-3 line-clamp-2">{item.title}</h4>
                                            <a href={item.url} target="_blank" className="text-sm font-medium text-blue-600 hover:underline">อ่านรายละเอียดเพิ่มเติม →</a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
