<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niexian | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Dancing+Script:wght@700&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        body.modal-open { overflow: hidden; }

        /* --- RAINBOW ANIMATION EFFECT --- */
        .rainbow-text {
            background: linear-gradient(to right, #ffadad, #ffd6a5, #fdffb6, #caffbf, #9bf6ff, #a0c4ff, #bdb2ff, #ffc6ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-flow 3s linear infinite;
            font-weight: 800;
        }

        @keyframes rainbow-flow {
            to { background-position: 200% center; }
        }

        /* --- MAIN HEADER --- */
        .rainbow-container {
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .r-n { color: #ff3b30; }
        .r-i { color: #ff9500; }
        .r-e { color: #ffcc00; }
        .r-x { color: #4cd964; }
        .r-i2 { color: #007aff; }
        .r-a { color: #5856d6; }
        .r-n2 { color: #af52de; }

        .star { color: #00ffcc; font-size: 1.8rem; margin-bottom: 10px; }
        .welcome-text { font-size: clamp(1.2rem, 4vw, 2rem); margin-bottom: 30px; font-weight: 400; }
        .nx-bold { font-weight: 800; }

        /* --- DEV TAG SECTION --- */
        .dev-wrapper { position: relative; display: inline-block; margin-bottom: 50px; }
        .brush-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140%; height: 60px; background: rgba(30, 80, 180, 0.35);
            filter: blur(25px); z-index: -1; border-radius: 50px;
        }
        .dev-tag { color: #ff4d4d; font-size: 2.2rem; font-weight: bold; }
        .dev-name { font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin-left: 15px; }

        /* --- CODE WINDOW --- */
        .code-window {
            background: #111; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 30px; width: 100%; max-width: 600px; margin-bottom: 60px;
        }
        .code-area { font-family: 'Fira Code', monospace; font-size: clamp(0.8rem, 2.5vw, 1rem); line-height: 1.8; text-align: left; }
        .line { display: block; width: 0; white-space: nowrap; overflow: hidden; border-right: 2px solid transparent; }
        .line-1 { animation: typing 1s steps(30) 0.5s forwards, hideCursor 0.1s 1.5s forwards; }
        .line-2 { animation: typing 1s steps(30) 1.5s forwards, hideCursor 0.1s 2.5s forwards; }
        .line-3 { animation: typing 1.5s steps(40) 2.5s forwards, hideCursor 0.1s 4.0s forwards; }
        .line-4 { animation: typing 1.2s steps(35) 4.0s forwards, blinkCursor 0.8s infinite 5.2s; }

        @keyframes typing { from { width: 0; border-right-color: #fff; } to { width: 100%; border-right-color: #fff; } }
        @keyframes hideCursor { to { border-right-color: transparent; } }
        @keyframes blinkCursor { 0%, 100% { border-right-color: #fff; } 50% { border-right-color: transparent; } }

        .c-yellow { color: #ffcc00; } .c-pink { color: #ff00ff; } .c-cyan { color: #00cccc; } .c-green { color: #a6e22e; } .c-gray { color: #75715e; }

        /* --- FOOTER --- */
        .footer-minimal {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 25px;
            color: #777; font-size: 0.8rem; padding-top: 30px; border-top: 1px solid #222;
            width: 100%; max-width: 1000px;
        }
        .footer-item { display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; transition: color 0.3s ease; }
        .footer-item:hover { color: #ffffff; }
        .svg-icon { width: 16px; height: 16px; fill: currentColor; }

        /* --- POPUP SYSTEM --- */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; opacity: 0; visibility: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .popup-box {
            background: #111; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1); padding: 50px 30px;
            border-radius: 24px; text-align: center; max-width: 450px; width: 90%;
            transform: scale(0.8); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-overlay.active .popup-box { transform: scale(1); }

        .popup-title {
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            margin-bottom: 35px;
            line-height: 1.5;
        }

        .popup-buttons { display: flex; gap: 20px; justify-content: center; }
        
        /* แก้ไขปุ่มให้ตรงตามรูปที่ 2 */
        .btn {
            padding: 12px 45px; 
            font-size: 1.2rem; 
            font-weight: 800; 
            border-radius: 12px;
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        
        /* ปุ่ม YES สีขาว */
        .btn-yes {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #ffffff;
        }
        .btn-yes:hover {
            transform: translateY(-3px);
            background-color: #e6e6e6;
        }

        /* ปุ่ม NO สีดำขอบขาว */
        .btn-no {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
        }
        .btn-no:hover {
            transform: translateY(-3px);
            background-color: rgba(255, 255, 255, 0.1);
        }

    </style>
</head>
<body class="modal-open">

    <div id="popup-container" class="popup-overlay">
        <div class="popup-box">
            <h1 class="popup-title rainbow-text">
                ยิงเว็ปกูดับ<br>ให้จับไข่ไอมอส
            </h1>
            <div class="popup-buttons">
                <button id="btn-confirm" class="btn btn-yes">YES</button>
                <button id="btn-cancel" class="btn btn-no">NO</button>
            </div>
        </div>
    </div>

    <div class="rainbow-container">
        <span class="r-n">n</span><span class="r-i">i</span><span class="r-e">e</span><span class="r-x">x</span><span class="r-i2">i</span><span class="r-a">a</span><span class="r-n2">n</span>
    </div>

    <div class="star">✦</div>

    <div class="welcome-text">
        Welcome to the <span class="nx-bold">NX.</span> website.
    </div>

    <div class="dev-wrapper">
        <div class="brush-bg"></div>
        <span class="dev-tag">Dev.</span>
        <span class="dev-name">Niexian</span>
    </div>

    <div class="code-window">
        <div class="code-area">
            <span class="line line-1"><span class="c-yellow">This_page</span>.<span class="c-pink">home</span> = <span class="c-yellow">true</span>;</span>
            <span class="line line-2"><span class="c-yellow">if</span> (<span class="c-cyan">page_niexian</span>) <span class="c-yellow">niexian_home</span>();</span>
            <span class="line line-3"><span class="c-yellow">else</span> <span class="c-pink">console</span>.<span class="c-pink">log</span>(<span class="c-green">"Welcome to the NX. website."</span>);</span>
            <span class="line line-4"><span class="c-yellow">window</span>.<span class="c-pink">location</span> = <span class="c-gray">"https://niexian.site";</span></span>
        </div>
    </div>

    <div class="footer-minimal">
        <div class="footer-item">
            <svg class="svg-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15l-5-5 1.41-1.41L11 14.17l7.59-7.59L20 8l-9 9z" fill="currentColor"/></svg>
            <span class="footer-label">Javascript & NodeJS</span>
        </div>
        <div class="footer-item">
            <svg class="svg-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z" fill="currentColor"/></svg>
            <span class="footer-label">Full Backend</span>
        </div>
        <div class="footer-item">
            <svg class="svg-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" fill="currentColor"/></svg>
            <span class="footer-label">Peak Performance</span>
        </div>
        <a href="https://www.instagram.com/xi4nnnqz_" target="_blank" class="footer-item">
            <svg class="svg-icon" viewBox="0 0 24 24" width="16" height="16"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.332 3.608 1.308.975.975 1.245 2.242 1.308 3.607.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.063 1.366-.333 2.633-1.308 3.608-.975.975-2.242 1.245-3.607 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.063-2.633-.333-3.608-1.308-.975-.975-1.245-2.242-1.308-3.607-.058-1.266-.07-1.646-.07-4.85s.012-3.584.07-4.85c.062-1.366.332-2.633 1.308-3.608.975-.975 2.242-1.245 3.607-1.308 1.266-.058 1.646-.07 4.85-.07zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948s.014 3.667.072 4.947c.2 4.337 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072s3.667-.014 4.947-.072c4.358-.2 6.78-2.618 6.98-6.98.058-1.281.072-1.689.072-4.948s-.014-3.667-.072-4.947c-.2-4.338-2.617-6.78-6.98-6.98-1.281-.058-1.69-.072-4.949-.072zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" fill="currentColor"/></svg>
            <span class="footer-label">xi4nnnqz_</span>
        </a>
    </div>

    <script>
        window.addEventListener('load', () => {
            const popup = document.getElementById('popup-container');
            const confirmBtn = document.getElementById('btn-confirm');
            const cancelBtn = document.getElementById('btn-cancel');

            // Show popup with delay
            setTimeout(() => {
                popup.classList.add('active');
            }, 600);

            // Close popup on YES
            confirmBtn.addEventListener('click', () => {
                popup.classList.remove('active');
                document.body.classList.remove('modal-open');
            });

            // Redirect on NO
            cancelBtn.addEventListener('click', () => {
                window.location.href = "https://www.google.com";
            });
        });
    </script>

</body>
</html>
