<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puatify - ข่าวสารประชาสัมพันธ์</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; background: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const firebaseConfig = {
            apiKey: "AIzaSyCaEqoS5vNS1tzkxI1ikXoOab_LamAUP8U",
            authDomain: "puatify.firebaseapp.com",
            projectId: "puatify",
            storageBucket: "puatify.firebasestorage.app",
            messagingSenderId: "600667811812",
            appId: "1:600667811812:web:1c7ee053163aa87009e1f1"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function App() {
            const [fbNews, setFbNews] = useState([]);
            const [internalNews, setInternalNews] = useState([]);

            useEffect(() => {
                fetch('https://rss.app/feeds/v1.1/86OgZH1IGruJ0DEX.json').then(r => r.json()).then(d => setFbNews(d.items));
                db.collection('announcements').orderBy('date', 'desc').onSnapshot(ss => {
                    setInternalNews(ss.docs.map(doc => ({id: doc.id, ...doc.data()})));
                });
            }, []);

            return (
                <div className="min-h-screen">
                    <nav className="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-2xl font-bold text-blue-600">Puatify</h1>
                        <a href="admin.html" className="text-gray-400 text-xs hover:text-blue-500">ADMIN</a>
                    </nav>
                    <div className="max-w-4xl mx-auto p-4 space-y-10 mt-6">
                        <section>
                            <h2 className="text-xl font-bold mb-4 border-l-4 border-yellow-400 pl-3">📌 ประกาศล่าสุด</h2>
                            <div className="space-y-4">
                                {internalNews.length === 0 && <p className="text-gray-400">ไม่มีประกาศในขณะนี้</p>}
                                {internalNews.map(item => (
                                    <div key={item.id} className="bg-white p-6 rounded-2xl border shadow-sm border-yellow-100 transition-all hover:scale-[1.01]">
                                        <h3 className="font-bold text-lg text-blue-800">{item.title}</h3>
                                        <p className="text-gray-600 mt-2 whitespace-pre-line">{item.content}</p>
                                        <p className="text-[10px] text-gray-400 mt-4 uppercase">{new Date(item.date).toLocaleString('th-TH')}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                        <section>
                            <h2 className="text-xl font-bold mb-4 border-l-4 border-blue-600 pl-3">🔵 ข่าวจาก Facebook</h2>
                            <div className="grid md:grid-cols-2 gap-4">
                                {fbNews.map((item, i) => (
                                    <div key={i} className="bg-white p-4 rounded-2xl border shadow-sm hover:shadow-md transition">
                                        <h3 className="font-bold line-clamp-2 text-gray-800">{item.title}</h3>
                                        <a href={item.url} target="_blank" className="text-blue-500 text-sm mt-3 block font-medium">อ่านต่อที่ Facebook →</a>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
