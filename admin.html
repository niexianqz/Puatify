<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Puatify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div id="auth-section" class="text-center bg-white p-10 rounded-3xl shadow-xl border w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">Admin Login</h1>
        <button onclick="login()" class="w-full bg-white border px-8 py-3 rounded-2xl font-bold shadow hover:bg-gray-50 transition flex items-center justify-center gap-2">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18"> Login with Google
        </button>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-2xl bg-white p-8 rounded-3xl shadow-xl border">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-gray-800">จัดการประกาศ</h1>
            <button onclick="logout()" class="text-red-500 text-sm font-bold">LOGOUT</button>
        </div>
        <div class="space-y-4">
            <input type="text" id="title" placeholder="หัวข้อประกาศ" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <textarea id="content" placeholder="เนื้อหาประกาศ..." rows="5" class="w-full p-4 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50"></textarea>
            <button onclick="addNews()" id="postBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg transition">ลงประกาศทันที</button>
        </div>
        <hr class="my-8">
        <div id="news-list" class="space-y-3"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCaEqoS5vNS1tzkxI1ikXoOab_LamAUP8U",
            authDomain: "puatify.firebaseapp.com",
            projectId: "puatify",
            storageBucket: "puatify.firebasestorage.app",
            messagingSenderId: "600667811812",
            appId: "1:600667811812:web:1c7ee053163aa87009e1f1"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            // ⚠️ เปลี่ยนอีเมลด้านล่างนี้เป็นเมลของคุณ
            if (user && user.email === "niexianqz@gmail.com") { 
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadNews();
            } else if (user) {
                alert("ขออภัย คุณไม่มีสิทธิ์เข้าถึง");
                auth.signOut();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        async function addNews() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            if(!title || !content) return alert("กรุณากรอกให้ครบ");
            document.getElementById('postBtn').disabled = true;
            await db.collection('announcements').add({ title, content, date: new Date().toISOString() });
            document.getElementById('title').value = ''; document.getElementById('content').value = '';
            document.getElementById('postBtn').disabled = false;
            loadNews();
        }

        async function loadNews() {
            const ss = await db.collection('announcements').orderBy('date', 'desc').get();
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            ss.forEach(doc => {
                list.innerHTML += `<div class="p-4 rounded-2xl flex justify-between border bg-gray-50 items-center shadow-sm">
                    <div class="font-bold text-gray-700 truncate mr-4">${doc.data().title}</div>
                    <button onclick="deleteNews('${doc.id}')" class="text-red-400 hover:text-red-600 font-bold">ลบ</button>
                </div>`;
            });
        }

        async function deleteNews(id) { if(confirm('ต้องการลบใช่ไหม?')) { await db.collection('announcements').doc(id).delete(); loadNews(); } }
    </script>
</body>
</html>
