<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Puatify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="auth-section" class="flex flex-col items-center justify-center min-h-screen">
        <div class="bg-white p-10 rounded-3xl shadow-xl text-center border border-gray-200">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">Puatify Admin</h1>
            <p class="text-gray-500 mb-8">กรุณาเข้าสู่ระบบเพื่อจัดการประกาศ</p>
            <button onclick="login()" class="flex items-center justify-center gap-3 bg-white border border-gray-300 px-6 py-3 rounded-xl font-bold hover:bg-gray-50 transition w-full">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                เข้าสู่ระบบด้วย Google
            </button>
        </div>
    </div>

    <div id="admin-panel" class="hidden max-w-3xl mx-auto p-6">
        <div class="flex justify-between items-center mb-10 bg-white p-4 rounded-2xl shadow-sm border">
            <div class="flex items-center gap-3">
                <div id="user-img" class="w-10 h-10 rounded-full bg-blue-100 border"></div>
                <div>
                    <p class="text-sm text-gray-500">ยินดีต้อนรับ</p>
                    <p id="user-name" class="font-bold text-gray-800">Admin</p>
                </div>
            </div>
            <button onclick="logout()" class="text-red-500 bg-red-50 px-4 py-2 rounded-lg hover:bg-red-100 transition text-sm font-bold">ออกจากระบบ</button>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-sm border mb-8">
            <h2 class="text-xl font-bold mb-6 text-gray-800">📝 สร้างประกาศใหม่</h2>
            <div class="space-y-4">
                <input type="text" id="title" placeholder="หัวข้อประกาศ (เช่น แจ้งหยุดเรียน)" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                <textarea id="content" placeholder="เนื้อหาที่ต้องการแจ้งให้นักเรียนทราบ..." rows="4" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition"></textarea>
                <button onclick="addNews()" id="btn-post" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">ลงประกาศทันที</button>
            </div>
        </div>

        <h2 class="text-lg font-bold mb-4 text-gray-600">รายการประกาศทั้งหมด</h2>
        <div id="news-list" class="space-y-4">
            </div>
    </div>

    <script>
        // ใช้ Config ของคุณที่ให้มา
        const firebaseConfig = {
            apiKey: "AIzaSyCaEqoS5vNS1tzkxI1ikXoOab_LamAUP8U",
            authDomain: "puatify.firebaseapp.com",
            projectId: "puatify",
            storageBucket: "puatify.firebasestorage.app",
            messagingSenderId: "600667811812",
            appId: "1:600667811812:web:1c7ee053163aa87009e1f1",
            measurementId: "G-4V57M5DGM5"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function login() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-img').style.backgroundImage = `url(${user.photoURL})`;
                document.getElementById('user-img').style.backgroundSize = 'cover';
                loadNews();
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
            }
        });

        async function addNews() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const btn = document.getElementById('btn-post');

            if(!title || !content) return alert('กรุณากรอกข้อมูลให้ครบครับ');

            btn.innerText = "กำลังบันทึก...";
            btn.disabled = true;

            try {
                await db.collection('announcements').add({
                    title: title,
                    content: content,
                    date: new Date().toISOString()
                });
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
                alert('ลงประกาศเรียบร้อยแล้ว!');
                loadNews();
            } catch (err) {
                alert('เกิดข้อผิดพลาด: ' + err.message);
            }
            btn.innerText = "ลงประกาศทันที";
            btn.disabled = false;
        }

        async function loadNews() {
            const container = document.getElementById('news-list');
            container.innerHTML = '<p class="text-center text-gray-400 py-10">กำลังโหลดประกาศ...</p>';
            
            const snapshot = await db.collection('announcements').orderBy('date', 'desc').get();
            
            if(snapshot.empty) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">ยังไม่มีประกาศในขณะนี้</p>';
                return;
            }

            container.innerHTML = '';
            snapshot.forEach(doc => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-5 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div class="pr-4">
                            <h3 class="font-bold text-gray-800">${data.title}</h3>
                            <p class="text-xs text-gray-400">${new Date(data.date).toLocaleString('th-TH')}</p>
                        </div>
                        <button onclick="deleteNews('${doc.id}')" class="text-red-400 hover:text-red-600 p-2 font-medium">ลบ</button>
                    </div>
                `;
            });
        }

        async function deleteNews(id) {
            if(confirm('ยืนยันที่จะลบประกาศนี้ใช่ไหม?')) {
                await db.collection('announcements').doc(id).delete();
                loadNews();
            }
        }
    </script>
</body>
</html>
